appId: app.noxed
productName: noxed
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - '!**/{.vscode,.claude}/**'
  - '!src/**'
  - '!electron.vite.config.ts'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,vitest.config.ts}'
  - '!*.tsbuildinfo'
  - '!{AGENTS.md,README.md,logo.svg}'
# spawn-helper must exist as a real executable file on disk — it cannot run
# from inside the asar archive
asarUnpack:
  - node_modules/node-pty/**
# Fail the build if the bundled RDP sidecar isn't self-contained (still links
# Homebrew dylibs) — prevents shipping a binary that won't run on a clean machine.
afterPack: ./scripts/verify-sidecar.js
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Sign with Developer ID + notarize so Gatekeeper opens the app without the
  # "unidentified developer" / "damaged" warnings. Hardened runtime is required
  # for notarization; entitlements relax it just enough for Electron + node-pty.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  # macOS 15+ blocks connections to LAN hosts (192.168.x.x, etc.) unless the app
  # holds Local Network permission. Without this usage string the system never
  # presents the prompt and silently fails the connect with EHOSTUNREACH.
  extendInfo:
    NSLocalNetworkUsageDescription: >-
      noxed connects to SSH, RDP, database, and Kubernetes hosts on your local
      network.
  # Ship the self-contained RDP sidecar (built via native/rdp-spike: run
  # build-freerdp-static.sh then `make rdp-sidecar-static`) into the app bundle.
  # Lands at Contents/Resources/rdp-sidecar — see sidecarPath() in ipc/rdp.ts.
  extraResources:
    - from: native/rdp-spike/rdp-sidecar
      to: rdp-sidecar
  target:
    - dmg
    - zip
win:
  icon: build/icon.png
  # Ship the self-contained RDP sidecar (built via native/rdp-spike/CMakeLists.txt
  # with vcpkg's x64-windows-static FreeRDP). Lands at resources/rdp-sidecar.exe —
  # see sidecarPath() in ipc/rdp.ts and the win32 check in verify-sidecar.js.
  extraResources:
    - from: native/rdp-spike/rdp-sidecar.exe
      to: rdp-sidecar.exe
  target:
    - nsis
linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
    - deb
