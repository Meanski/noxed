name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # keytar builds against libsecret on Linux
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      # The RDP feature ships a native FreeRDP sidecar bundled into the macOS
      # app (via extraResources). Build it statically so it runs on a clean Mac
      # with no Homebrew. The runner is arm64, matching the app's distribution
      # arch. Cached so FreeRDP isn't recompiled on every release.
      - name: Cache static FreeRDP
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            native/rdp-spike/.freerdp-src
            native/rdp-spike/.freerdp-static
          key: freerdp-static-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('native/rdp-spike/build-freerdp-static.sh') }}

      - name: Build RDP sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja jansson openssl@3
          cd native/rdp-spike
          ./build-freerdp-static.sh
          make rdp-sidecar-static

      # Notarization uses an App Store Connect API key. electron-builder reads
      # APPLE_API_KEY as a path to the .p8, so materialize it from the secret.
      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey.p8"
          echo "APPLE_API_KEY=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      # Two build steps: the macOS one carries the Developer ID + notarization
      # env; the Windows/Linux one must NOT define CSC_LINK at all, because
      # electron-builder treats an empty-but-defined CSC_LINK as a file path and
      # fails ("Env WIN_CSC_LINK is not correct"). Windows is signed afterwards
      # via SSL.com; Linux stays unsigned.
      - name: Build installers (macOS, signed + notarized)
        if: runner.os == 'macOS'
        run: |
          npm run build
          npx electron-builder --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          # APPLE_API_KEY (path to .p8) is exported via GITHUB_ENV in the prep step.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Build installers (Windows/Linux)
        if: runner.os != 'macOS'
        run: |
          npm run build
          npx electron-builder --publish never
        env:
          # No code signing here. Windows is signed below via SSL.com; Linux is
          # unsigned. Must stay false and leave CSC_LINK undefined.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Set up Java (for CodeSignTool)
        if: runner.os == 'Windows'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sign Windows installer with SSL.com eSigner
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SSL_USERNAME: ${{ secrets.SSL_USERNAME }}
          SSL_PASSWORD: ${{ secrets.SSL_PASSWORD }}
          SSL_CREDENTIAL_ID: ${{ secrets.SSL_CREDENTIAL_ID }}
          SSL_TOTP_SECRET: ${{ secrets.SSL_TOTP_SECRET }}
        run: |
          # Authenticate the API call so we don't hit the 60/hr unauthenticated
          # rate limit on shared runner IPs.
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/SSLcom/CodeSignTool/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -like "*windows*.zip" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find a Windows CodeSignTool asset in the latest SSL.com release" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile CodeSignTool.zip
          Expand-Archive -Path CodeSignTool.zip -DestinationPath CodeSignTool

          # The SSL.com zip is built on macOS and ships a __MACOSX resource-fork
          # folder, so don't assume the first directory is the tool. Find the
          # real CodeSignTool.bat by name and run it from its own dir so the
          # relative jar/ and conf/ lookups resolve.
          $batFile = Get-ChildItem -Path CodeSignTool -Recurse -Filter CodeSignTool.bat |
            Where-Object { $_.FullName -notmatch '__MACOSX' } | Select-Object -First 1
          if (-not $batFile) { throw "CodeSignTool.bat not found after extraction" }
          $toolHome = $batFile.Directory.FullName

          $signedDir = Join-Path (Get-Location).Path "dist\signed"
          New-Item -ItemType Directory -Force -Path $signedDir | Out-Null

          $exes = Get-ChildItem -Path dist -Filter *.exe
          if (-not $exes) { throw "No .exe found in dist to sign" }

          Push-Location $toolHome
          try {
            $exes | ForEach-Object {
              & $batFile.FullName sign `
                -username="$env:SSL_USERNAME" `
                -password="$env:SSL_PASSWORD" `
                -credential_id="$env:SSL_CREDENTIAL_ID" `
                -totp_secret="$env:SSL_TOTP_SECRET" `
                -input_file_path="$($_.FullName)" `
                -output_dir_path="$signedDir"
              if ($LASTEXITCODE -ne 0) { throw "CodeSignTool failed signing $($_.Name)" }
              Copy-Item -Path (Join-Path $signedDir $_.Name) -Destination $_.FullName -Force
            }
          } finally {
            Pop-Location
          }

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
